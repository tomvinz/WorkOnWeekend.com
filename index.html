<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WorkOn Weekend — Coming Soon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #6366f1);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
      max-width: 500px;
      width: 90%;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: 400;
      font-size: 1.1rem;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .highlight {
      color: #38bdf8;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .time-box {
      text-align: center;
    }

    .time-box span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .label {
      font-size: 0.8rem;
      opacity: 0.6;
    }

    input {
      padding: 12px;
      border: none;
      border-radius: 8px;
      width: 70%;
      margin-right: 10px;
      outline: none;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #0ea5e9;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0284c7;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>WorkOn <span class="highlight">Weekend</span></h1>
    <h2>Find flexible weekend jobs. Post gigs. Earn smarter.</h2>

    <div class="countdown">
      <div class="time-box">
        <span id="days">0</span>
        <div class="label">Days</div>
      </div>
      <div class="time-box">
        <span id="hours">0</span>
        <div class="label">Hours</div>
      </div>
      <div class="time-box">
        <span id="minutes">0</span>
        <div class="label">Minutes</div>
      </div>
      <div class="time-box">
        <span id="seconds">0</span>
        <div class="label">Seconds</div>
      </div>
    </div>

    <div>
      <input type="email" placeholder="Enter your email" />
      <button onclick="alert('Thanks! We will notify you 🚀')">Notify Me</button>
    </div>

    <div class="footer">
      Launching soon • Built for students, freelancers & weekend hustlers
    </div>
  </div>

  <script>
    // Set launch date (EDIT THIS)
    const launchDate = new Date("2026-06-01T00:00:00").getTime();

    const timer = setInterval(() => {
      const now = new Date().getTime();
      const distance = launchDate - now;

      if (distance < 0) {
        clearInterval(timer);
        document.querySelector(".countdown").innerHTML = "We are live!";
        return;
      }

      document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
      document.getElementById("hours").innerText = Math.floor((distance / (1000 * 60 * 60)) % 24);
      document.getElementById("minutes").innerText = Math.floor((distance / (1000 * 60)) % 60);
      document.getElementById("seconds").innerText = Math.floor((distance / 1000) % 60);

    }, 1000);
  </script>
</body>
</html>
