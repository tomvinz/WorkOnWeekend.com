<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOW Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(255,255,255,0.05);
}

.container {
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input, textarea, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

button {
  padding:10px;
  background:#0ea5e9;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div>WOW Dashboard</div>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <h2>Create Job (Employer)</h2>

  <div id="jobForm">
    <input id="title" placeholder="Job title">
    <textarea id="desc" placeholder="Description"></textarea>
    <input id="location" placeholder="Location">
    <input id="pay" placeholder="Pay">
    <button onclick="createJob()">Post Job</button>
  </div>
<h2>Find Jobs</h2>

<div class="card">
  <input id="search" placeholder="Search jobs..." oninput="applyFilters()">

  <select id="filterLocation" onchange="applyFilters()">
    <option value="">All Locations</option>
  </select>

  <button onclick="detectLocation()">📍 Use My Location</button>
</div>
  <h2>Job Feed</h2>
  <div id="jobs"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  serverTimestamp,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import {
  getAuth,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "workonweekends-96011.firebaseapp.com",
  projectId: "workonweekends-96011"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// =========================
// AUTH GUARD
// =========================
import { getAuth, signOut, onAuthStateChanged } from 
"https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";



// Hide page until auth is ready
document.body.style.display = "none";

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    document.body.style.display = "block"; // show UI only after auth confirmed
    loadJobs();
  }
});

// =========================
// CREATE JOB
// =========================
window.createJob = async function () {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const location = document.getElementById("location").value;
  const pay = document.getElementById("pay").value;

  if (!title || !desc || !location) return alert("Fill all fields");

  await addDoc(collection(db, "jobs"), {
    title,
    description: desc,
    location,
    pay,
    createdAt: serverTimestamp(),
    createdBy: auth.currentUser.uid
  });

  loadJobs();
};

// =========================
// LOAD JOBS
// =========================
let allJobs = [];

async function loadJobs() {
  const q = query(collection(db, "jobs"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);

  allJobs = [];

  snap.forEach(docSnap => {
    allJobs.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  populateLocationFilter();
  renderJobs(allJobs);
}

// =========================
// RENDER JOBS
// =========================
function renderJobs(jobs) {
  const container = document.getElementById("jobs");
  container.innerHTML = "";

  jobs.forEach(j => {
    container.innerHTML += `
      <div class="card">
        <h3>${j.title}</h3>
        <p>${j.description}</p>
        <small>📍 ${j.location} • 💶 ${j.pay}</small>
        <br><br>
        <button onclick="applyJob('${j.id}', '${j.title}')">
          Apply
        </button>
      </div>
    `;
  });
}

// =========================
// APPLY TO JOB (Phase 3)
// =========================
window.applyJob = async function (jobId, jobTitle) {
  const user = auth.currentUser;

  if (!user) return;

  const applicationId = `${user.uid}_${jobId}`;
  const applicationRef = doc(db, "applications", applicationId);

  const existing = await getDoc(applicationRef);

  if (existing.exists()) {
    alert("⚠️ Already applied to this job");
    return;
  }

  await setDoc(applicationRef, {
    jobId,
    jobTitle,
    applicantId: user.uid,
    appliedAt: new Date(),
    status: "pending"
  });

  alert("✅ Application submitted!");
};

// =========================
// FILTERS
// =========================
function populateLocationFilter() {
  const select = document.getElementById("filterLocation");

  const locations = [...new Set(allJobs.map(j => j.location))];

  select.innerHTML = `<option value="">All Locations</option>`;

  locations.forEach(loc => {
    select.innerHTML += `<option value="${loc}">${loc}</option>`;
  });
}

window.applyFilters = function () {
  const search = document.getElementById("search").value.toLowerCase();
  const location = document.getElementById("filterLocation").value;

  const filtered = allJobs.filter(j => {
    const matchesSearch =
      j.title.toLowerCase().includes(search) ||
      j.description.toLowerCase().includes(search);

    const matchesLocation =
      !location || j.location === location;

    return matchesSearch && matchesLocation;
  });

  renderJobs(filtered);
};

// =========================
// LOCATION DETECTION (FREE)
// =========================
window.detectLocation = function () {
  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      // Simple display (no paid API)
      alert(`📍 Your location: ${lat.toFixed(2)}, ${lon.toFixed(2)}`);
    },
    () => alert("Location permission denied")
  );
};

// =========================
// LOGOUT
// =========================
window.logout = function () {
  signOut(auth);
};


</script>

</body>
</html>
